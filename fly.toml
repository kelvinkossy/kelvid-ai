app = "vidforge"
primary_region = "lhr"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  port = 80
  protocol = "tcp"
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
  [[services.ports]]
    port = 443
    protocol = "tcp"
  [[services.ports]]
    port = 80
    protocol = "tcp"
    handlers = ["http"]
  [[services.ports]]
    port = 443
    protocol = "tcp"
    handlers = ["tls"]
